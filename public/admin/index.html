<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#08080a" />
  <meta name="color-scheme" content="dark" />
  <title>글 작성 · 블로그 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #08080a; --surface: #111114; --surface2: #19191d;
      --text: #e4e0d9; --text2: #8b8680; --text3: #5c5955;
      --accent: #e8a849; --accent2: #f0bc5e;
      --border: #1a1a1e; --border2: #2a2a30;
      --font-body: "Pretendard Variable", "Pretendard", system-ui, sans-serif;
      --font-heading: "Newsreader", Georgia, serif;
      --font-mono: "Consolas", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }

    /* Layout */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: calc(2rem + env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right))
               calc(2rem + env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .header h1 { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; }
    .header-actions { display: flex; gap: 0.5rem; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; font-size: 0.8rem;
      font-weight: 500; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger { background: transparent; color: #ef4444; border: 1px solid #3b1111; }
    .btn-danger:hover { background: #3b1111; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }

    /* Setup screen */
    .setup {
      max-width: 480px;
      margin: 15vh auto;
      text-align: center;
      padding: 0 max(1.5rem, env(safe-area-inset-right)) 0 max(1.5rem, env(safe-area-inset-left));
    }
    .setup h1 { font-family: var(--font-heading); font-size: 1.75rem; margin-bottom: 0.75rem; }
    .setup p { color: var(--text2); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .setup input { width: 100%; padding: 0.7rem 1rem; font-size: 0.9rem; font-family: var(--font-mono);
      background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; }
    .setup input:focus { outline: none; border-color: var(--accent); }
    .setup .hint { font-size: 0.75rem; color: var(--text3); margin-bottom: 1.5rem; }
    .setup .hint a { color: var(--accent); }

    /* Post list */
    .post-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem;
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.5rem; transition: all 0.2s; cursor: pointer; }
    .post-item:hover { border-color: var(--border2); background: var(--surface); }
    .post-title { font-family: var(--font-heading); font-weight: 600; font-size: 1rem; }
    .post-meta { font-size: 0.75rem; color: var(--text3); margin-top: 0.25rem; font-family: var(--font-mono); }
    .post-actions { display: flex; gap: 0.35rem; flex-shrink: 0; cursor: default; }
    .draft-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 9999px;
      background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); margin-left: 0.5rem; }
    .empty { text-align: center; padding: 4rem 0; color: var(--text3); font-family: var(--font-heading); font-style: italic; }

    /* Editor */
    .editor { display: none; }
    .editor.active { display: block; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text3); margin-bottom: 0.4rem; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 0.6rem 0.9rem; font-size: 0.9rem; font-family: var(--font-body);
      background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field textarea { min-height: 400px; resize: vertical; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.7; }
    .toggle-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .toggle { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: var(--text2); }
    .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .editor-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;
      padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .status { font-size: 0.8rem; color: var(--text3); }
    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    /* Loading */
    .loading { text-align: center; padding: 3rem; color: var(--text3); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  </style>
</head>
<body>
<main>

<!-- Setup Screen -->
<div id="setup" class="setup" style="display:none;">
  <h1>블로그 관리</h1>
  <p>처음 사용하려면 GitHub Personal Access Token이 필요합니다.</p>
  <form onsubmit="event.preventDefault(); saveToken();">
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" aria-label="GitHub Personal Access Token" autocomplete="current-password" />
    <div class="hint">
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=Blog+Admin" target="_blank" rel="noopener noreferrer" aria-label="GitHub에서 새 토큰 만들기 (새 탭에서 열림)">
        여기서 토큰 생성 →
      </a>
      (repo 권한 체크)
    </div>
    <button type="submit" class="btn btn-primary">시작하기</button>
  </form>
</div>

<!-- Post List -->
<div id="list" class="container" style="display:none;">
  <div class="header">
    <h1>글 목록</h1>
    <div class="header-actions">
      <a href="/blog/" class="btn btn-ghost btn-sm">← 블로그</a>
      <button type="button" class="btn btn-primary btn-sm" onclick="newPost()">+ 새 글</button>
    </div>
  </div>
  <div id="post-list"></div>
</div>

<!-- Editor -->
<div id="editor" class="editor container">
  <div class="header">
    <h1 id="editor-title">새 글 작성</h1>
    <button type="button" class="btn btn-ghost btn-sm" onclick="confirmAndShowList()">← 목록</button>
  </div>

  <div class="field">
    <label for="ed-title">제목</label>
    <input type="text" id="ed-title" placeholder="글 제목을 입력하세요" autocomplete="off" />
  </div>
  <div class="field">
    <label for="ed-desc">설명</label>
    <input type="text" id="ed-desc" placeholder="한 줄 설명" autocomplete="off" />
  </div>
  <div class="field">
    <label for="ed-tags">태그 (쉼표로 구분)</label>
    <input type="text" id="ed-tags" placeholder="deep-learning, python, tips" autocomplete="off" />
  </div>
  <div class="field">
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="ed-draft" checked /> 초안</label>
      <label class="toggle"><input type="checkbox" id="ed-featured" /> 추천</label>
      <label class="toggle"><input type="checkbox" id="ed-math" /> 수식 (KaTeX)</label>
    </div>
  </div>
  <div class="field">
    <label for="ed-body">본문 (Markdown)</label>
    <textarea id="ed-body" placeholder="마크다운으로 작성하세요..." spellcheck="false"></textarea>
  </div>
  <div class="editor-footer">
    <span id="ed-status" class="status" role="status" aria-live="polite"></span>
    <div style="display:flex;gap:0.5rem;">
      <button type="button" class="btn btn-ghost" onclick="confirmAndShowList()">취소</button>
      <button type="button" class="btn btn-primary" onclick="savePost()">저장</button>
    </div>
  </div>
</div>
</main>

<script>
const REPO = "concrete-sangminlee/blog";
const BRANCH = "main";
const CONTENT_PATH = "src/content/blog";
const API = "https://api.github.com";

let token = localStorage.getItem("blog_token");
let posts = [];
let editingFile = null; // { path, sha } when editing existing
let dirty = false; // set when the editor has unsaved changes

const BASE_TITLE = document.title; // "글 작성 · 블로그 관리"
function setTabTitle(suffix) {
  document.title = suffix ? `${suffix} · 블로그 관리` : BASE_TITLE;
}

function getHeaders() {
  return { Authorization: `Bearer ${token}`, Accept: "application/vnd.github.v3+json" };
}

// Warn before the tab closes if there's unsaved work in the editor.
window.addEventListener("beforeunload", (e) => {
  if (dirty) {
    e.preventDefault();
    e.returnValue = "";
  }
});

// Every editor input marks the draft dirty; save and list navigation clear
// it. The listener is scoped to the editor region to keep unrelated UI
// interactions (checkbox toggles on list pages, etc.) out of it.
document.addEventListener("input", (e) => {
  if (e.target && document.getElementById("editor")?.contains(e.target)) {
    dirty = true;
  }
});

// Init
if (token) { showList(); } else { document.getElementById("setup").style.display = "block"; }

function saveToken() {
  const input = document.getElementById("token-input");
  const t = input.value.trim();
  if (!t) {
    // Give the token field focus back so the user sees where to fix it
    // rather than pressing submit silently.
    input.focus();
    return;
  }
  token = t;
  localStorage.setItem("blog_token", t);
  document.getElementById("setup").style.display = "none";
  showList();
}

// Wrap the in-page cancel / back-to-list buttons so they warn when
// there are unsaved edits. The beforeunload listener only fires on tab
// close; clicking inside the SPA needs its own guard.
function confirmAndShowList() {
  if (dirty && !confirm("저장하지 않은 변경 사항이 있습니다. 나가시겠습니까?")) return;
  showList();
}

async function showList() {
  document.getElementById("list").style.display = "block";
  document.getElementById("editor").classList.remove("active");
  document.getElementById("setup").style.display = "none";
  editingFile = null;
  dirty = false;
  setTabTitle("글 목록");

  const container = document.getElementById("post-list");
  container.innerHTML = '<div class="loading" role="status" aria-label="글 목록 불러오는 중"><div class="spinner" aria-hidden="true"></div></div>';

  try {
    const res = await fetch(`${API}/repos/${REPO}/contents/${CONTENT_PATH}?ref=${BRANCH}`, { headers: getHeaders() });
    if (res.status === 404) { container.innerHTML = '<div class="empty">아직 글이 없습니다.</div>'; posts = []; return; }
    if (res.status === 401) { localStorage.removeItem("blog_token"); token = null; location.reload(); return; }
    if (res.status === 403) {
      // 403 from GitHub typically means rate limited when the token is
      // valid; the header carries the reset time.
      const reset = res.headers.get("x-ratelimit-reset");
      const wait = reset ? new Date(Number(reset) * 1000).toLocaleTimeString("ko-KR") : "잠시 후";
      container.innerHTML = `<div class="empty">GitHub API 제한. ${wait}에 다시 시도하세요.</div>`;
      return;
    }
    const files = await res.json();
    posts = Array.isArray(files) ? files.filter(f => f.name.endsWith(".mdx") || f.name.endsWith(".md")) : [];

    if (posts.length === 0) { container.innerHTML = '<div class="empty">아직 글이 없습니다.</div>'; return; }

    // Fetch frontmatter for each post
    const details = await Promise.all(posts.map(async f => {
      const r = await fetch(f.url, { headers: getHeaders() });
      const d = await r.json();
      const content = atob(d.content);
      const fm = parseFrontmatter(content);
      return { ...f, fm, raw: content };
    }));

    details.sort((a, b) => (b.fm.pubDate || "").localeCompare(a.fm.pubDate || ""));

    // Escape before putting untrusted frontmatter into HTML (text) and
    // into inline onclick attribute strings (JS-ish). Without this a
    // title like "'유레카' <tag>" breaks rendering or the click handler.
    const escHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
    container.innerHTML = details.map(f => {
      const title = f.fm.title || f.name;
      const isDraft = f.fm.draft === true || f.fm.draft === "true";
      // Use data-* + delegated click handlers below, not inline onclicks —
      // titles with single quotes (e.g. "'유레카' 순간") blew up the
      // onclick="deletePost(...)" string once browsers decoded &#39;.
      return `
      <div class="post-item" data-path="${escHtml(f.path)}">
        <div>
          <div class="post-title">${escHtml(title)}${isDraft ? '<span class="draft-badge">초안</span>' : ''}</div>
          <div class="post-meta">${f.fm.pubDate ? `<time datetime="${escHtml(f.fm.pubDate)}">${escHtml(f.fm.pubDate)}</time> · ` : ""}${escHtml(f.name)}</div>
        </div>
        <div class="post-actions">
          <button type="button" class="btn btn-ghost btn-sm" data-action="edit" data-path="${escHtml(f.path)}">편집</button>
          <button type="button" class="btn btn-danger btn-sm" data-action="delete" data-path="${escHtml(f.path)}" data-sha="${escHtml(f.sha)}" data-title="${escHtml(title)}">삭제</button>
        </div>
      </div>
    `;
    }).join("");

    // Delegated click handler keyed on data-action. Clicks inside
    // .post-actions (including gaps between buttons) shouldn't bubble up
    // to trigger the row-level editPost.
    container.onclick = (e) => {
      const btn = e.target.closest("[data-action]");
      if (btn) {
        if (btn.dataset.action === "edit") editPost(btn.dataset.path);
        else if (btn.dataset.action === "delete") {
          deletePost(btn.dataset.path, btn.dataset.sha, btn.dataset.title);
        }
        return;
      }
      if (e.target.closest(".post-actions")) return;
      const row = e.target.closest(".post-item");
      if (row) editPost(row.dataset.path);
    };
  } catch (e) {
    container.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}

function parseFrontmatter(content) {
  const match = content.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return {};
  const fm = {};
  match[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if (idx === -1) return;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx + 1).trim();
    if (val === "true") val = true;
    else if (val === "false") val = false;
    else if (val.startsWith('"') && val.endsWith('"')) {
      // Undo the \" escape savePost wrote, so loading a title like
      // "유레카" 순간 round-trips back to its original form.
      val = val.slice(1, -1).replace(/\\"/g, '"');
    }
    else if (val.startsWith("[") && val.endsWith("]")) {
      val = val.slice(1, -1)
        .split(",")
        .map(s => s.trim().replace(/^"|"$/g, "").replace(/\\"/g, '"'))
        .filter(Boolean);
    }
    fm[key] = val;
  });
  return fm;
}

function newPost() {
  editingFile = null;
  document.getElementById("editor-title").textContent = "새 글 작성";
  setTabTitle("새 글 작성");
  document.getElementById("ed-title").value = "";
  document.getElementById("ed-desc").value = "";
  document.getElementById("ed-tags").value = "";
  document.getElementById("ed-draft").checked = true;
  document.getElementById("ed-featured").checked = false;
  document.getElementById("ed-math").checked = false;
  document.getElementById("ed-body").value = "";
  document.getElementById("ed-status").textContent = "";
  document.getElementById("list").style.display = "none";
  document.getElementById("editor").classList.add("active");
  dirty = false;
}

async function editPost(path) {
  const status = document.getElementById("ed-status");
  document.getElementById("list").style.display = "none";
  document.getElementById("editor").classList.add("active");
  document.getElementById("editor-title").textContent = "글 수정";
  setTabTitle("글 수정");
  status.textContent = "불러오는 중...";
  status.className = "status";

  const res = await fetch(`${API}/repos/${REPO}/contents/${path}?ref=${BRANCH}`, { headers: getHeaders() });
  const data = await res.json();
  const content = atob(data.content);
  editingFile = { path, sha: data.sha };

  const fm = parseFrontmatter(content);
  const bodyMatch = content.match(/^---\n[\s\S]*?\n---\n([\s\S]*)$/);
  const body = bodyMatch ? bodyMatch[1].trim() : content;

  // Remember the original pubDate so editing preserves it instead of
  // silently bumping the publish time to "now" on every save.
  editingFile.pubDate = fm.pubDate || null;

  document.getElementById("ed-title").value = fm.title || "";
  document.getElementById("ed-desc").value = fm.description || "";
  document.getElementById("ed-tags").value = Array.isArray(fm.tags) ? fm.tags.join(", ") : (fm.tags || "");
  document.getElementById("ed-draft").checked = fm.draft === true;
  document.getElementById("ed-featured").checked = fm.featured === true;
  document.getElementById("ed-math").checked = fm.math === true;
  document.getElementById("ed-body").value = body;
  status.textContent = "";
  // Populating fields programmatically would trigger the input listener
  // on some browsers; reset after the pre-fill settles.
  setTimeout(() => { dirty = false; }, 0);
}

async function savePost() {
  const status = document.getElementById("ed-status");
  const title = document.getElementById("ed-title").value.trim();
  const desc = document.getElementById("ed-desc").value.trim();
  const tags = document.getElementById("ed-tags").value.split(",").map(s => s.trim()).filter(Boolean);
  const draft = document.getElementById("ed-draft").checked;
  const featured = document.getElementById("ed-featured").checked;
  const math = document.getElementById("ed-math").checked;
  // trimEnd keeps the template's single trailing newline authoritative
  // so bodies don't accumulate blank lines on repeated saves.
  const body = document.getElementById("ed-body").value.trimEnd();

  // Match the content schema in src/content/config.ts so admin saves
  // don't push commits that then fail the Astro build.
  if (title.length < 6) { status.textContent = "제목은 6자 이상이어야 합니다"; status.className = "status error"; return; }
  if (title.length > 100) { status.textContent = "제목은 100자 이하로 줄여주세요"; status.className = "status error"; return; }
  if (desc.length < 16) { status.textContent = "설명은 16자 이상이어야 합니다"; status.className = "status error"; return; }
  if (desc.length > 200) { status.textContent = "설명은 200자 이하로 줄여주세요"; status.className = "status error"; return; }
  if (tags.length > 5) { status.textContent = "태그는 최대 5개까지 지정할 수 있습니다"; status.className = "status error"; return; }

  // For edits, preserve the original pubDate so "Update" doesn't quietly
  // republish an old post with today's timestamp. For new posts, use the
  // same local-time ISO pattern as scripts/new-post.mjs so both tools
  // produce identical frontmatter.
  let today;
  if (editingFile && editingFile.pubDate) {
    today = editingFile.pubDate;
  } else {
    const pad = (n) => String(n).padStart(2, "0");
    const now = new Date();
    today = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }
  const slug = title.toLowerCase().replace(/[^\w\s가-힣-]/g, "").replace(/[\s_]+/g, "-").replace(/^-+|-+$/g, "");
  // If a title is only punctuation/symbols, the slug ends up empty and
  // the file path would collapse to ".mdx" — catch that before we write.
  if (!editingFile && !slug) {
    status.textContent = "슬러그로 변환할 글자(한글, 영문, 숫자)가 없습니다";
    status.className = "status error";
    return;
  }
  // Escape embedded double quotes so titles like "'유레카' 순간" don't
  // break the YAML frontmatter block.
  const yamlEscape = (s) => s.replace(/"/g, '\\"');
  const tagsStr = tags.length > 0 ? `[${tags.map(t => `"${yamlEscape(t)}"`).join(", ")}]` : "[]";

  const content = `---
title: "${yamlEscape(title)}"
description: "${yamlEscape(desc)}"
pubDate: ${today}
tags: ${tagsStr}
draft: ${draft}
featured: ${featured}
math: ${math}
---

${body}
`;

  const path = editingFile ? editingFile.path : `${CONTENT_PATH}/${slug}.mdx`;
  const payload = {
    message: editingFile ? `Update: ${title}` : `New post: ${title}`,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH,
  };
  if (editingFile) payload.sha = editingFile.sha;

  status.textContent = "저장 중...";
  status.className = "status";

  try {
    const res = await fetch(`${API}/repos/${REPO}/contents/${path}`, {
      method: "PUT", headers: { ...getHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({ message: `HTTP ${res.status}` }));
      throw new Error(e.message);
    }
    dirty = false;
    status.textContent = "저장 완료! 자동 배포 중...";
    status.className = "status success";
    setTimeout(() => showList(), 1500);
  } catch (e) {
    status.textContent = `오류: ${e.message}`;
    status.className = "status error";
  }
}

async function deletePost(path, sha, title) {
  if (!confirm(`"${title}" 글을 삭제하시겠습니까?`)) return;
  try {
    const res = await fetch(`${API}/repos/${REPO}/contents/${path}`, {
      method: "DELETE", headers: { ...getHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify({ message: `Delete: ${title}`, sha, branch: BRANCH }),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({ message: `HTTP ${res.status}` }));
      throw new Error(e.message);
    }
    showList();
  } catch (e) {
    alert("삭제 실패: " + e.message);
  }
}

// Cmd/Ctrl+S saves the post from anywhere in the editor (title, body,
// etc.), so the author doesn't have to mouse over to the save button.
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    const editor = document.getElementById("editor");
    if (editor && editor.classList.contains("active")) {
      e.preventDefault();
      savePost();
    }
  }
});
</script>
