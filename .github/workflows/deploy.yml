name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Run the blog audit before withastro/action builds. The audit
      # enforces frontmatter hygiene, em-dash bans, future-dated pubDate,
      # duplicate h1 etc. — issues that would otherwise deploy silently.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match package.json engines (≥20.11). The LTS tag always resolves
          # to a version ≥ 20.11 and picks up security patches automatically.
          node-version: "lts/*"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (strictest TS preset)
        run: npm run typecheck
      - name: Run blog audit
        run: npm run audit:blog

      - name: Install, build, and upload
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
